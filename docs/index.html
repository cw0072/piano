<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Piano Note Guessing Game</title>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; display:flex; flex-direction:column; align-items:center; padding:20px; }
  .hud { width:370px; display:flex; justify-content:space-between; margin-bottom:12px; font-weight:600; }
  .stave-box { width:370px; height:200px; border:2px solid #ccc; display:flex; align-items:center; justify-content:center; margin-bottom:12px; background:#fff; }
  .stave-canvas { width:330px; height:160px; }
  .answers { display:flex; gap:8px; flex-wrap:wrap; width:520px; justify-content:center; }
  .note-btn { width:80px; height:60px; background:#e9e9e9; border-radius:6px; border:1px solid #bbb; display:inline-flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; user-select:none; transition:background .12s; }
  .note-btn.correct { background:#4CAF50; color:white; border-color:#3a9a3f; }
  .note-btn.incorrect { background:#F44336; color:white; border-color:#c2332a; }
  .note-btn:active { transform:translateY(1px); }
  .small { font-size:14px; color:#666; }
  /* SVG note styling */
  .staff-line { stroke:#000; stroke-width:1; }
  .clef { font-size:48px; dominant-baseline:middle; }
  .quarter { fill:#000; stroke:none; }
  .ledger { stroke:#000; stroke-width:2; }
</style>
</head>
<body>
  <div class="hud">
    <div id="scoreDisplay">Score: 0 pts</div>
    <div id="timeDisplay">Time left: 0 s</div>
  </div>

  <div class="stave-box">
    <svg id="stave" class="stave-canvas" viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" aria-label="Stave with single note" role="img"></svg>
    <p id="next-round-announce" style="display:none; font-weight: bold; font-size: 30px">Get Ready for next round<p>
  </div>

  <div class="answers" id="answers" style="max-width: 370px">
    <!-- Buttons will be generated here -->
  </div>

  <div class="pauseArea" id="pauseArea">
   <button style="width: 370px; height:60px; padding:5px; margin: 20px" id='pause-btn'>Pause</button>
  </div>
<script>
(() => {
  // Parse time per round from query string (?t=30)
  function getQueryParam(name, fallback) {
    const params = new URLSearchParams(location.search);
    const v = params.get(name);
    return v !== null ? (isNaN(Number(v)) ? fallback : Math.max(1, Math.floor(Number(v)))) : fallback;
  }
  const ROUND_SECONDS = getQueryParam('t', 30);
  const TOTAL_ROUNDS = getQueryParam('r',8);

  // Note pools (natural notes only) in allowed ranges
  const TREBLE_NOTES = ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5"];
  const BASS_NOTES   = ["A2","B2","C3","D3","E3","F3","G3","A3","B3","C4"];

  // Seven buttons labelled A-G
  const BUTTON_LABELS = ["A","B","C","D","E","F","G"];

  // Score and state
  let score = 0;
  let timeLeft = ROUND_SECONDS;
  let currentClef = "treble"; // alternates between 'treble' and 'bass'
  let currentNote = null; // e.g. "C4"
  let roundTimeoutFn = null;
  let timerInterval = null;
  let timerIntervalFn = null;
  let roundActive = false;
  let roundTimeout = null;
  let roundEnded = null;
  let readyLeftTime = 0;
  let paused = false;
  let roundNum = 0;

  // SVG and layout parameters for drawing
  const svg = document.getElementById('stave');
  const svgW = 480, svgH = 160;
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

  // Staff lines vertical positions
  const staffTop = 40;
  const halfSpacing = 6;
  const lineSpacing = halfSpacing*2; // px between staff lines
  const staffLines = Array.from({length:5}, (_,i) => staffTop + i*lineSpacing); // 5 lines

  // Manual vertical mapping for allowed notes for a pleasing visual mapping.
  // Values are y coordinates for the center of the note head (in SVG coords).
  // These are tuned to place notes on/around the staff with ledger lines where necessary.
  const TREBLE_Y = {
    "F5": staffLines[4] - 8*halfSpacing,
    "E5": staffLines[4] - 7*halfSpacing,
    "D5": staffLines[4] - 6*halfSpacing,
    "C5": staffLines[4] - 5*halfSpacing,
    "B4": staffLines[4] - 4*halfSpacing,
    "A4": staffLines[4] - 3*halfSpacing,
    "G4": staffLines[4] - 2*halfSpacing,
    "F4": staffLines[4] - 1*halfSpacing,
    "E4": staffLines[4] + 0*halfSpacing,
    "D4": staffLines[4] + 1*halfSpacing,
    "C4": staffLines[4] + 2*halfSpacing
  };

  const BASS_Y = {
    "C4": staffLines[0] - 2*halfSpacing,
    "B3": staffLines[0] - 1*halfSpacing,
    "A3": staffLines[0] - 0*halfSpacing,
    "G3": staffLines[0] + 1*halfSpacing,
    "F3": staffLines[0] + 2*halfSpacing,
    "E3": staffLines[0] + 3*halfSpacing,
    "D3": staffLines[0] + 4*halfSpacing,
    "C3": staffLines[0] + 5*halfSpacing,
    "B2": staffLines[0] + 6*halfSpacing,
    "A2": staffLines[0] + 7*halfSpacing
  };

  // Utility: pick random from array
	function getRandomInt(min, max) {
    const minCeiled = Math.ceil(min);
    const maxFloored = Math.floor(max);
    return Math.floor(Math.random() * (maxFloored - minCeiled) + minCeiled); // The maximum is exclusive and the minimum is inclusive
  }

  function randPick(arr){ return arr[getRandomInt(0,arr.length)]; }

  // Generate answer buttons
  const answersDiv = document.getElementById('answers');
  BUTTON_LABELS.forEach(lbl => {
    const btn = document.createElement('button');
    btn.className = 'note-btn';
    btn.id = 'note-btn-'+lbl;
    btn.textContent = lbl;
    btn.setAttribute('aria-label', `Answer ${lbl}`);
    btn.addEventListener('click', () => onAnswer(btn, lbl));
    answersDiv.appendChild(btn);
  });

  // Add pause button listener

  document.getElementById('pause-btn').addEventListener('click', () => onTogglePause());

  const scoreDisplay = document.getElementById('scoreDisplay');
  const timeDisplay = document.getElementById('timeDisplay');

  function setScoreDisplay() {
    scoreDisplay.textContent = `Score: ${score} pts`;
  }
  function setTimeDisplay() {
    timeDisplay.textContent = `Round: ${roundNum+1}/${TOTAL_ROUNDS} Time left: ${timeLeft} s`;
  }
  function onTogglePause() {
    if (!roundActive) {
      if (paused) {
        paused = false;
        document.getElementById('pause-btn').textContent = 'Pause';
        roundEnded = Date.now();
        roundTimeout = setTimeout(roundTimeoutFn,readyLeftTime);
      }
      else {
        readyLeftTime = Math.max(0,5000 - (Date.now() - roundEnded));
        paused = true;
        document.getElementById('pause-btn').textContent = 'Resume';
        clearTimeout(roundTimeout);
      }
      return;
    }

    if (paused) {
      paused = false;
      document.getElementById('pause-btn').textContent = 'Pause';
      document.getElementById('stave').style.display = 'block';
      timerInterval = setInterval(timerIntervalFn, 1000);
    }
    else {
      timeLeft -= 1;
      paused = true;
      document.getElementById('pause-btn').textContent = 'Resume';
      document.getElementById('stave').style.display = 'none';
      clearInterval(timerInterval);
      setTimeDisplay();
    }
  }

  // Draw empty stave with clef and current note (if any)
  function renderStave() {
    // Clear
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    // Draw staff lines
    staffLines.forEach(y => {
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',40);
      line.setAttribute('x2',460);
      line.setAttribute('y1',y);
      line.setAttribute('y2',y);
      line.classList.add('staff-line');
      svg.appendChild(line);
    });

    // Draw clef (use musical Unicode symbols; fallback to text label if fonts lack glyphs)
    const clefText = document.createElementNS('http://www.w3.org/2000/svg','text');
    clefText.setAttribute('x',54);
    clefText.setAttribute('y', staffLines[2]); // vertical center-ish
    clefText.classList.add('clef');

    if (currentClef === 'treble') {
      clefText.textContent = '𝄞'; // G clef
    } else {
      clefText.textContent = '𝄢'; // F clef
    }
    svg.appendChild(clefText);

    // If there's a current note, draw it
    if (currentNote) {
      const centerX = 300;
      const noteY = (currentClef === 'treble') ? (TREBLE_Y[currentNote] ?? staffLines[2]) : (BASS_Y[currentNote] ?? staffLines[2]);
      drawQuarterNote(centerX, noteY);

      // Draw ledger lines if the note is outside staff (draw small short lines across where needed)
      // We'll draw ledger lines for positions far above/below the five staff lines.
      // Candidate ledger Y positions (two top and two bottom ledger lines)
      const top = staffLines[0];
      const bottom = staffLines[4];
      // If note is above top by >= lineSpacing -> draw ledger lines for each ledger step it crosses on line positions
      // We'll compute nearest ledger line Ys (every lineSpacing) above or below to draw.
      // Determine ledger lines between note and nearest staff extremes
      if (noteY < top - lineSpacing/2) {
        // ledger lines above staff
        for (let y = top - lineSpacing; y >= noteY - 2; y -= lineSpacing) {
          drawLedger(centerX, y);
        }
      } else if (noteY > bottom + lineSpacing/2) {
        // ledger lines below staff
        for (let y = bottom + lineSpacing; y <= noteY + 2; y += lineSpacing) {
          drawLedger(centerX, y);
        }
      }
    }
  }

  function drawLedger(cx, y) {
    const ledger = document.createElementNS('http://www.w3.org/2000/svg','line');
    ledger.setAttribute('x1', cx - 18);
    ledger.setAttribute('x2', cx + 18);
    ledger.setAttribute('y1', y);
    ledger.setAttribute('y2', y);
    ledger.classList.add('ledger');
    svg.appendChild(ledger);
  }

  function drawQuarterNote(cx, cy) {
    // note head (ellipse) rotated slightly, and a stem
    const ellipse = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    ellipse.setAttribute('cx', cx);
    ellipse.setAttribute('cy', cy);
    ellipse.setAttribute('rx', 10);
    ellipse.setAttribute('ry', 7);
    ellipse.setAttribute('transform', `rotate(-20 ${cx} ${cy})`);
    ellipse.classList.add('quarter');
    svg.appendChild(ellipse);

    // stem direction: if note is below middle line, stem up on right; else stem down on left.
    // Determine middle y of staff
    const middleY = staffLines[2];
    if (cy >= middleY) {
      // stem up, to right
      const stem = document.createElementNS('http://www.w3.org/2000/svg','rect');
      stem.setAttribute('x', cx + 6);
      stem.setAttribute('y', cy - 35);
      stem.setAttribute('width', 2.8);
      stem.setAttribute('height', 35);
      stem.setAttribute('transform', `rotate(-2 ${cx+6} ${cy-35})`);
      stem.classList.add('quarter');
      svg.appendChild(stem);
    } else {
      // stem down, on left
      const stem = document.createElementNS('http://www.w3.org/2000/svg','rect');
      stem.setAttribute('x', cx - 12);
      stem.setAttribute('y', cy);
      stem.setAttribute('width', 2.8);
      stem.setAttribute('height', 35);
      stem.setAttribute('transform', `rotate(-2 ${cx-12} ${cy})`);
      stem.classList.add('quarter');
      svg.appendChild(stem);
    }
  }

  // Pick a new note based on the current clef and render it
  function newNote() {
    var previousNote = currentNote;
    if (currentClef === 'treble') {
      do {
        currentNote = randPick(TREBLE_NOTES);
      } while (currentNote == previousNote);
    } else {
      do {
        currentNote = randPick(BASS_NOTES);
      } while (currentNote == previousNote);
    }
    renderStave();
  }

  // Handle answer click
  function onAnswer(button, label) {
    if (paused || !roundActive) return;
    // temporarily disable clicks (ignore repeated fast clicks)
    disableAnswerClicks(true);

    // Determine correctness: compare label letter to currentNote's letter (first character)
    const noteLetter = currentNote[0]; // e.g. 'C' from 'C4'
    const isCorrect = (label === noteLetter);

    var correctButton = document.getElementById('note-btn-'+noteLetter);
    correctButton.classList.add('correct');

    if (isCorrect) {
      button.classList.add('correct');
      score += 2;
    } else {
      button.classList.add('incorrect');
      score = Math.max(0, score - 1);
    }
    setScoreDisplay();

    // After a short delay, remove color, show new note, re-enable buttons
    setTimeout(() => {
      button.classList.remove('correct','incorrect');
      correctButton.classList.remove('correct');
      newNote();
      disableAnswerClicks(false);
    }, 250 + (isCorrect ? 0 : 750));
  }

  function disableAnswerClicks(disable) {
    const btns = document.querySelectorAll('.note-btn');
    btns.forEach(b => b.disabled = disable);
  }

  roundTimeoutFn = function() {
    currentClef = (currentClef === 'treble') ? 'bass' : 'treble';
    startRound();
  };

  timerIntervalFn = function() {
      timeLeft -= 1;
      if (timeLeft < 0) timeLeft = 0;
      setTimeDisplay();
      if (timeLeft <= 0) {
        // round over: alternate clef and immediately start next round
        clearInterval(timerInterval);
        roundActive = false;
        ++roundNum;
        if (roundNum == TOTAL_ROUNDS) {
          document.getElementById('next-round-announce').textContent=`Your score was ${score}!`
        }
        else {
          // small pause (5s) before starting next round for visual clarity
          roundEnded = Date.now();
          roundTimeout = setTimeout(roundTimeoutFn, 5000);
        }

        document.getElementById('next-round-announce').style.display='block';
        document.getElementById('stave').style.display='none';
      }
    };

  // Timer control
  function startRound() {
    document.getElementById('next-round-announce').style.display='none';
    document.getElementById('stave').style.display='block';
    roundActive = true;
    timeLeft = ROUND_SECONDS;
    setTimeDisplay();
    setScoreDisplay();
    // show a first note for this round
    newNote();

    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(timerIntervalFn, 1000);
  }

  // Initialize UI values
  setScoreDisplay();
  setTimeDisplay();

  // Add a small hint text to the bottom (non-essential)
  const hint = document.createElement('div');
  hint.className = 'small';
  hint.style.marginTop = '10px';
  hint.style.maxWidth = '370px';
  hint.textContent = `Rounds are ${ROUND_SECONDS}s long and alternate between treble and bass clefs. Correct +2, incorrect -1 (min 0).`;
  document.body.appendChild(hint);

  // Start the first round
  startRound();

  // Expose for debugging (optional)
  window._pianoGame = { startRound, newNote, TREBLE_Y, BASS_Y };

})();
</script>
</body>
</html>
